name: Setup Hinode toolchain
description: Go + Node + package manager (pnpm default, npm opt-in) with a frozen install.
inputs:
  package-manager:
    description: pnpm (default) or npm
    default: pnpm
  node-version:
    default: "22.x"
  go-version:
    default: ">1.0.0"
runs:
  using: composite
  steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
    - name: Enable Corepack (pnpm)
      if: ${{ inputs.package-manager == 'pnpm' }}
      shell: bash
      run: corepack enable
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.package-manager }}
    # Windows only: Hugo cannot spawn pnpm's isolated postcss bin shim. A
    # hoisted (npm-style flat) node_modules restores the layout Hugo accepts.
    # Linux/macOS keep the strict isolated layout (phantom-dep protection).
    # Harmless for repos without PostCSS.
    - name: Use hoisted node-linker on Windows
      if: ${{ inputs.package-manager == 'pnpm' && runner.os == 'Windows' }}
      shell: bash
      run: echo "npm_config_node_linker=hoisted" >> "$GITHUB_ENV"
    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
          pnpm install --frozen-lockfile
        else
          npm install
        fi
