name: Release (reusable)
on:
  workflow_call:
    inputs:
      package-manager:
        type: string
        default: pnpm
    secrets:
      SEMANTIC_RELEASE_GIT:
        required: true
      NPM_TOKEN:
        required: false
permissions:
  contents: read
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gethinode/.github/actions/setup-hinode@v1
        with:
          package-manager: ${{ inputs.package-manager }}
      - name: Create release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_GIT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release
